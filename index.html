<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed & Tahany — Wedding Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.top-bar{background:#1a1a1a;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:16px;font-weight:500;letter-spacing:0.01em}
.top-bar p{font-size:12px;color:#999;margin-top:2px}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px 60px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:14px 16px;border:0.5px solid #e5e5e5}
.stat-label{font-size:12px;color:#888;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600}
.stat-val.green{color:#1D9E75}
.stat-val.amber{color:#c0811a}
.filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-family:inherit;transition:all 0.15s}
.filter-btn:hover{border-color:#999}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.section{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;margin-bottom:12px;overflow:hidden}
.sec-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background 0.1s}
.sec-header:hover{background:#fafafa}
.sec-icon{font-size:18px;width:22px;text-align:center;color:#666}
.sec-title{font-size:15px;font-weight:500;flex:1}
.sec-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:#f0f0f0;color:#666;border:none}
.sec-badge.done{background:#dcf5ec;color:#166f50}
.sec-badge.partial{background:#fff3dc;color:#995f0a}
.chevron{font-size:18px;color:#bbb;transition:transform 0.2s;line-height:1}
.chevron.open{transform:rotate(180deg)}
.progress-track{height:3px;background:#f0f0f0}
.progress-fill{height:100%;background:#1D9E75;transition:width 0.3s}
.sec-body{}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 18px;border-bottom:0.5px solid #f0f0f0;transition:background 0.1s}
.item:last-child{border-bottom:none}
.item:hover{background:#fafafa}
.item label{display:flex;align-items:flex-start;gap:12px;cursor:pointer;flex:1;min-width:0}
.item input[type=checkbox]{margin-top:2px;width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:#1D9E75}
.item-content{flex:1;min-width:0}
.item-name{font-size:14px;color:#1a1a1a;line-height:1.45;transition:color 0.15s}
.item-name.checked{text-decoration:line-through;color:#bbb}
.item-sub{font-size:12px;color:#888;margin-top:3px;line-height:1.5}
.tags{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
.tag-decision{background:#fff0f0;color:#c0392b}
.tag-optional{background:#edf4ff;color:#1a6abf}
.item-price{font-size:12px;font-weight:500;color:#888;white-space:nowrap;padding-left:12px;flex-shrink:0;margin-top:1px}
.reset-btn{font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#c0392b;cursor:pointer;font-family:inherit}
.reset-btn:hover{background:#fff0f0;border-color:#c0392b}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:18px}
  .top-bar h1{font-size:14px}
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Ahmed &amp; Tahany — Wedding Checklist</h1>
    <p>July 4th, 2026 · Four Seasons Nile Plaza · CMC Advertising</p>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset all</button>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total items</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-val green" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">Remaining</div><div class="stat-val amber" id="s-rem">0</div></div>
    <div class="stat"><div class="stat-label">Progress</div><div class="stat-val" id="s-pct">0%</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('optional',this)">Optional</button>
    <button class="filter-btn" onclick="setFilter('decision',this)">Decision needed</button>
  </div>

  <div id="sections"></div>
</div>

<script>
const DATA = [

  ]},
  {id:'dj',icon:'🎧',title:'DJ',items:[
    {id:'d1',name:'Select DJ',sub:'Option A: Khaled Mamdouh (188K followers) · Option B: Khaled Hussein · Option C: Bassem Nagy · Option D: Kiro Adel',price:null,tags:['decision']},
    {id:'d2',name:'Confirm DJ booking & contract',sub:null,price:null,tags:[]},

    {id:'ge2',name:'Finalize entrance dimensions after site visit',sub:'Welcome sign: fabric 3m x 1m',price:null,tags:[]},

    {id:'bs2',name:'Confirm stage dimensions — 14m x 3m + stairs + catwalk',sub:'5m x 2m catwalk connected to 9m x 10m dancefloor',price:'EGP 32,400',tags:[]},

  ]},
  {id:'bar',icon:'🍹',title:'Bar design',items:[
    {id:'bar1',name:'Select bar design',sub:'Option 1: Round sculptural bar, mocha detailing, sphere centerpiece · Option 2: Round bar, floral detailing, illuminated canopy · Concept 2: Bar with backdrop + hanging lamps',price:null,tags:['decision']},

  ]},
  {id:'seating',icon:'🪑',title:'Seating & furniture',items:[
    {id:'st1',name:'Confirm seating style mix',sub:'Round tables (intimate) + rectangular tables (linear arrangement)',price:null,tags:[]},
    {id:'st2',name:'2 large low Polo tables — seat 24 PAX each',sub:null,price:'EGP 19,200 total',tags:[]},
    {id:'st3',name:'362 low chairs — Option 1 (beige / available in gold or black)',sub:null,price:'EGP 108,600 total',tags:['decision']},

    {id:'st7',name:'6 high round tables — 150cm diameter, seat 4 PAX each',sub:null,price:'EGP 10,800 total',tags:[]},
    {id:'st8',name:'24 high chairs',sub:null,price:'EGP 8,064 total',tags:[]},
    {id:'st9',name:'2 structure installations inside Polo tables (3.5m x 3.5m each)',sub:null,price:'EGP 36,000 total',tags:[]},
  ]},
  {id:'centerpieces',icon:'🌸',title:'Centerpieces & florals',items:[
    {id:'cp1',name:'Polo table centerpieces — x2',sub:'Natural flowers + candles around full diameter',price:'EGP 43,200 total',tags:[]},
    {id:'cp2',name:'Rectangular & long table centerpieces — x32',sub:'Cluster of vases, ~20 roses each, crystal lamps & candles',price:'EGP 172,800 total',tags:[]},
    {id:'cp3',name:'Round table centerpieces — x11',sub:'Cluster of vases, ~10 roses, crystal lamps & candles',price:'EGP 36,960 total',tags:[]},
    {id:'cp4',name:'Mix & match 2–3 additional centerpiece designs',sub:'To be finalized with decorator',price:null,tags:['decision']},
    {id:'cp5',name:'Bridal entrance — 3 foam floral sculptures with flowers',sub:'Concept 1',price:null,tags:[]},
  ]},
  {id:'tableware',icon:'🍽️',title:'Tableware & accessories',items:[
    {id:'tw1',name:'Gold cutlery set — 386 guests',sub:null,price:'EGP 32,424 total',tags:[]},
    {id:'tw2',name:'Gold-framed show plates — 386 guests',sub:null,price:'EGP 37,056 total',tags:[]},
    {id:'tw3',name:'Frosted acrylic table numbers — 32 tables',sub:'Color to confirm: white / blush pink / ivory',price:'EGP 7,680 total',tags:['decision']},
  ]},
  {id:'invitation',icon:'✉️',title:'Digital invitation',items:[
    {id:'inv1',name:'Select invitation illustration concept',sub:'The Royal Palace: narrative view (couple in vintage car) or scenic view (floral archway)',price:null,tags:['decision']},
    {id:'inv2',name:'Finalize invitation content',sub:'Names, date, venue, countdown, RSVP, music, moments',price:null,tags:[]},
    {id:'inv3',name:'Confirm digital invitation package',sub:'Custom design · Countdown · Location · RSVP · Music · QR code per guest · Sending on behalf · After-sales',price:'EGP 10,000 + 2,000 fees',tags:[]},
    {id:'inv4',name:'Provide final guest list for QR code generation',sub:null,price:null,tags:[]},
    {id:'inv5',name:'Approve & send digital invitations',sub:null,price:null,tags:[]},
  ]},
  {id:'photography',icon:'📷',title:'Photography & videography',items:[
    {id:'ph1',name:'Book Hussein Abdelkader — full wedding coverage',sub:'4 photographers · 2+ cam Full HD · 3+ cam promo · Crane · 3 reels + full day stories',price:'EGP 110,000 + 22,000 fees',tags:[]},
    {id:'ph2',name:'Confirm photographer availability (Hussein or team member)',sub:'Price varies based on availability',price:null,tags:[]},
    {id:'ph3',name:'Pre-wedding photoshoot',sub:'Casual — pre-setups not allowed at hotel. Location by photographer.',price:'EGP 11,000–16,500 + fees',tags:['optional']},
    {id:'ph4',name:'Photo booth — unlimited prints',sub:null,price:'EGP 16,500 + 3,300 fees',tags:['optional']},
    {id:'ph5',name:'360 camera',sub:null,price:'EGP 11,000 + 2,200 fees',tags:['optional']},
    {id:'ph6',name:'Confirm call sheet & shot list',sub:'Family groups, couple moments, venue details, zaffa etc.',price:null,tags:[]},
  ]},
  {id:'logistics',icon:'🚚',title:'Logistics & coordination',items:[
    {id:'lg1',name:'Book CMC wedding logistics management',sub:'Full event ops · Vendor coordination · Guest flow · Entrance & registration · On-ground team · Bride & groom movement · Emergency handling',price:'EGP 100,000 + 20,000 fees',tags:[]},
    {id:'lg2',name:'Finalize vendor timeline & run-of-show document',sub:null,price:null,tags:[]},
    {id:'lg3',name:'Confirm transportation for decoration setup & workers',sub:null,price:'EGP 96,000',tags:[]},
    {id:'lg4',name:'Confirm guest entrance & registration process',sub:'Seating chart, welcome team, promoters',price:null,tags:[]},
    {id:'lg5',name:'Arrange bridal party schedule & movement plan',sub:null,price:null,tags:[]},
  ]},
  {id:'budget',icon:'💰',title:'Budget & contracts',items:[
    {id:'bg1',name:'Finalize Concept 1 decoration quote',sub:'Grand Total: EGP 5,265,700 · VAT: EGP 6,002,898 · Mgmt Fees: EGP 1,200,580',price:'EGP 5,265,700',tags:[]},
    {id:'bg2',name:'Finalize Concept 2 setup quote',sub:'Decorations: EGP 1,292,054 · Transport: EGP 96,000 · Total: EGP 1,601,318 · Mgmt Fees: EGP 320,264',price:'EGP 1,601,318',tags:[]},
    {id:'bg3',name:'Confirm Concept 2 furniture quote',sub:'Sub-total: EGP 213,264',price:'EGP 213,264',tags:[]},
    {id:'bg4',name:'Sign all vendor contracts',sub:'Zaffa · DJ · Entertainment · Decoration · Photography · Logistics',price:null,tags:[]},
    {id:'bg5',name:'Confirm payment schedule & deposits for all vendors',sub:null,price:null,tags:[]},
    {id:'bg6',name:'CMC management fees agreed (20% on all services)',sub:null,price:null,tags:[]},
  ]},
];

let filter = 'all';
let state = {};
DATA.forEach(s => s.items.forEach(it => { state[it.id] = false; }));
try { const sv = localStorage.getItem('at_wedding_v1'); if(sv) state = {...state,...JSON.parse(sv)}; } catch(e){}

function save(){ try{ localStorage.setItem('at_wedding_v1', JSON.stringify(state)); }catch(e){} }

function updateStats(){
  const all = Object.keys(state).length;
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById('s-total').textContent = all;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-rem').textContent = all - done;
  document.getElementById('s-pct').textContent = Math.round(done/all*100)+'%';
}

function getBadge(sec){
  const done = sec.items.filter(it=>state[it.id]).length;
  const total = sec.items.length;
  if(done===total) return ['done', done+'/'+total+' done'];
  if(done>0) return ['partial', done+'/'+total];
  return ['','0/'+total];
}

function setFilter(f, btn){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleSection(id){
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
}

function toggle(id, secId){
  state[id] = !state[id];
  save();
  const nameEl = document.querySelector('#item-'+id+' .item-name');
  if(nameEl) nameEl.classList.toggle('checked', state[id]);
  const sec = DATA.find(s=>s.id===secId);
  const done = sec.items.filter(it=>state[it.id]).length;
  const pct = Math.round(done/sec.items.length*100);
  const fill = document.getElementById('fill-'+secId);
  if(fill) fill.style.width = pct+'%';
  const badge = document.getElementById('badge-'+secId);
  if(badge){ const [bc,bt] = getBadge(sec); badge.className='sec-badge '+bc; badge.textContent=bt; }
  updateStats();
}

function resetAll(){
  if(!confirm('Reset all checkboxes?')) return;
  Object.keys(state).forEach(k=>{ state[k]=false; });
  save(); render();
}

function render(){
  const container = document.getElementById('sections');
  container.innerHTML = '';
  DATA.forEach(sec=>{
    const filtered = sec.items.filter(it=>{
      if(filter==='all') return true;
      if(filter==='pending') return !state[it.id];
      if(filter==='done') return state[it.id];
      if(filter==='optional') return it.tags.includes('optional');
      if(filter==='decision') return it.tags.includes('decision');
      return true;
    });
    if(!filtered.length) return;
    const [bc,bt] = getBadge(sec);
    const done = sec.items.filter(it=>state[it.id]).length;
    const pct = Math.round(done/sec.items.length*100);
    const el = document.createElement('div');
    el.className='section';
    el.innerHTML=`
      <div class="sec-header" onclick="toggleSection('${sec.id}')">
        <span class="sec-icon">${sec.icon}</span>
        <span class="sec-title">${sec.title}</span>
        <span class="sec-badge ${bc}" id="badge-${sec.id}">${bt}</span>
        <span class="chevron open" id="chev-${sec.id}">⌄</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="fill-${sec.id}" style="width:${pct}%"></div></div>
      <div class="sec-body" id="body-${sec.id}">
        ${filtered.map(it=>`
          <div class="item" id="item-${it.id}">
            <label>
              <input type="checkbox" ${state[it.id]?'checked':''} onchange="toggle('${it.id}','${sec.id}')">
              <div class="item-content">
                <div class="item-name ${state[it.id]?'checked':''}">${it.name}</div>
                ${it.sub?`<div class="item-sub">${it.sub}</div>`:''}
                ${it.tags.length?`<div class="tags">${it.tags.map(t=>`<span class="tag ${t==='decision'?'tag-decision':'tag-optional'}">${t==='decision'?'Decision needed':'Optional'}</span>`).join('')}</div>`:''}
              </div>
            </label>
            ${it.price?`<div class="item-price">${it.price}</div>`:''}
          </div>
        `).join('')}
      </div>`;
    container.appendChild(el);
  });
  updateStats();
}

render();
</script>
</body>
</html>
